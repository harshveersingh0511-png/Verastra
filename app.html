<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f5f1e8" />
  <title>Verastra · Decision Intelligence for Human Capital</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="assets/css/tokens.css" />
  <link rel="stylesheet" href="assets/css/base.css" />
  <link rel="stylesheet" href="assets/css/shell.css" />
  <link rel="stylesheet" href="assets/css/tools.css" />
  <link rel="stylesheet" href="assets/css/tool-shell.css" />
  <link rel="stylesheet" href="assets/css/dashboard.css" />
  <link rel="stylesheet" href="assets/css/methodology.css" />
  <link rel="stylesheet" href="assets/css/onboarding.css" />
  <link rel="stylesheet" href="assets/css/terminal.css" />
  <link rel="stylesheet" href="assets/css/dashboard-premium.css" />
  <link rel="stylesheet" href="assets/css/light-theme.css" />
</head>
<body class="theme-light">

<div class="app">

  <!-- ── SIDEBAR ─────────────────────────────────────────────────── -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar__brand">
      <div class="sidebar__brand-mark"></div>
      <span class="sidebar__brand-name">Verastra</span>
    </div>

    <nav class="sidebar__nav">
      <a href="#/dashboard" class="sidebar__item" data-surface="dashboard">
        <span class="sidebar__icon">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <rect x="2" y="2" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.4"/>
            <rect x="9" y="2" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.4"/>
            <rect x="2" y="9" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.4"/>
            <rect x="9" y="9" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.4"/>
          </svg>
        </span>
        <span>Dashboard</span>
      </a>

      <a href="#/tools" class="sidebar__item" data-surface="tools">
        <span class="sidebar__icon">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M3 4h10M3 8h10M3 12h10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
            <circle cx="5" cy="4" r="1" fill="currentColor"/>
            <circle cx="10" cy="8" r="1" fill="currentColor"/>
            <circle cx="7" cy="12" r="1" fill="currentColor"/>
          </svg>
        </span>
        <span>Tools</span>
      </a>

      <a href="#/methodology" class="sidebar__item" data-surface="methodology">
        <span class="sidebar__icon">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <rect x="3" y="2" width="10" height="12" rx="1" stroke="currentColor" stroke-width="1.4"/>
            <path d="M5 5h6M5 8h6M5 11h4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
          </svg>
        </span>
        <span>Methodology</span>
      </a>

      <a href="#/terminal" class="sidebar__item" data-surface="terminal">
        <span class="sidebar__icon">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <rect x="2" y="3" width="12" height="10" rx="1" stroke="currentColor" stroke-width="1.4"/>
            <path d="M5 7l2 1.5L5 10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M9 10.5h2.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
        </span>
        <span>Terminal</span>
      </a>

      <div class="sidebar__section-label">Workspace</div>

      <div class="sidebar__item" style="cursor:default; opacity:0.5;">
        <span class="sidebar__icon">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M8 3v10M3 8h10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
        </span>
        <span>New scenario</span>
      </div>
      <div class="sidebar__item" style="cursor:default; opacity:0.5;">
        <span class="sidebar__icon">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M3 4l5 4 5-4M3 8l5 4 5-4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
        <span>Saved</span>
      </div>
    </nav>

    <div class="sidebar__footer">
      <div class="sidebar__profile">
        <div class="sidebar__avatar" id="sidebar-avatar">HS</div>
        <div>
          <div class="sidebar__profile-name" id="sidebar-name">Harshveer Singh</div>
          <div class="sidebar__profile-role" id="sidebar-role">Transfer Pricing</div>
        </div>
      </div>
    </div>
  </aside>

  <!-- ── MAIN ────────────────────────────────────────────────────── -->
  <main class="app__main">

    <header class="topbar">
      <div class="topbar__crumb" id="topbar-crumb">
        <span class="topbar__crumb-current">Dashboard</span>
      </div>
      <div class="topbar__spacer"></div>
      <button class="topbar__cmdk" title="Quick navigate (deferred)">
        <span>Quick command</span>
        <span class="topbar__cmdk-key">⌘ K</span>
      </button>
    </header>

    <div id="view" class="view"></div>

  </main>

</div>

<!-- Boot -->
<script type="module">
  import { initRouter } from './assets/js/router.js';
  import { Store } from './assets/js/store.js';
  import * as Benchmarks from './assets/js/data/benchmarks.js';
  import * as Onboarding from './assets/js/onboarding.js';

  // Pre-load the benchmark dataset. All tool engines consume sync accessors
  // from it; loading once at boot guarantees those accessors are ready
  // before any view renders.
  await Benchmarks.load();

  // Hydrate sidebar from profile
  const profile = Store.profile;
  document.getElementById('sidebar-avatar').textContent = profile.initials;
  document.getElementById('sidebar-name').textContent = profile.name;
  document.getElementById('sidebar-role').textContent = profile.roleLabel || profile.role;

  initRouter();

  // First-entry intake — show if not onboarded
  if (Onboarding.shouldShow()) Onboarding.show();
</script>

<!-- Premium motion overlay: brass particles, cursor halo, scroll progress,
     magnetic queue rows, curve draw-in, pip cascade. Pure surface layer —
     does not touch content or hierarchy. -->
<script type="module" src="assets/js/dashboard-premium.js"></script>

</body>
</html>
